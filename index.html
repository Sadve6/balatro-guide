    '<div class="cn"><b>'+esc(j.name_cn)+'</b>'+tier+'<br><small style="color:#888">'+esc(j.name)+'</small></div>'+
    '<span class="ct '+j.rarity+'">'+RNAMES[j.rarity]+'</span>'+
    '<p class="ce">'+esc(j.effect)+'</p>'+
    '<div class="tags">'+tags+'</div></div>';
}

function show(id){
  var j = JOKERS[id];
  if(!j)return;
  var syn = (j.synergy||[]);
  var synHTML = syn.length ? '<div class="ms"><h4>推荐协同</h4><ul>'+syn.map(function(s){return '<li>'+esc(s)+'</li>'}).join('')+'</ul></div>' : '';
  var tier = j.tier ? '<span class="tier '+j.tier.toLowerCase()+'">'+j.tier+'</span>' : '';
  var combo = j.combo_tips || '';
  var comboHTML = combo ? '<div class="mc-tip"><h4>组合思路</h4><p>'+esc(combo)+'</p></div>' : '';
  document.getElementById('modal-body').innerHTML = '<h2 class="mn">'+esc(j.name_cn)+'</h2>'+
    '<div class="msub">'+esc(j.name)+'</div>'+
    '<div class="mm"><span class="ct '+j.rarity+'">'+RNAMES[j.rarity]+'</span>'+tier+'</div>'+
    '<p class="me">'+esc(j.effect)+'</p>'+synHTML+comboHTML;
  document.getElementById('modal').classList.add('on');
}

function closeModal(){document.getElementById('modal').classList.remove('on');}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.nav').forEach(function(n){n.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('on');
  document.getElementById('tab-'+name+'-btn').classList.add('active');
}

function doSearch(q){
  var lq = q.toLowerCase();
  var filtered = Object.values(JOKERS).filter(function(j){
    return j.name_cn.toLowerCase().indexOf(lq)>=0 || j.name.toLowerCase().indexOf(lq)>=0 || j.effect.toLowerCase().indexOf(lq)>=0;
  });
  document.getElementById('search-grid').innerHTML = filtered.length ? filtered.map(cardHTML).join('') : '<div class="empty">无结果</div>';
}

document.addEventListener('DOMContentLoaded',function(){
  var sorted = Object.values(JOKERS).sort(function(a,b){return (TIER[a.tier]||9)-(TIER[b.tier]||9);});
  document.getElementById('joker-grid').innerHTML = sorted.map(cardHTML).join('');
});

document.getElementById('modal').onclick = function(e){if(e.target===this)closeModal();};

</script>
</body>
</html>
