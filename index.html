*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#eaeaea;min-height:100vh}
header{background:#16213e;border-bottom:2px solid #e94560;padding:16px 24px;position:sticky;top:0;z-index:100}

.nav{display:inline-block;background:transparent;border:none;color:#a0a0a0;padding:8px 14px;cursor:pointer;font-size:.9rem;border-radius:8px;white-space:nowrap}

main{max-width:1400px;margin:0 auto;padding:24px}
.tab{display:none}
.tab.on{display:block}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}

input{min-width:180px;flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.card{background:#0f3460;border-radius:12px;padding:14px;cursor:pointer;border:2px solid transparent;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(233,69,96,.25);border-color:#e94560}
.card.common{border-left:4px solid #6b7280}
.card.uncommon{border-left:4px solid #3b82f6}
.card.rare{border-left:4px solid #a855f7}
.card.legendary{border-left:4px solid #f59e0b}
.ci{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:bold;color:#fff;margin-bottom:10px;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.cn{font-weight:700;font-size:.95rem;margin-bottom:6px}
.ct{display:inline-block;font-size:.7rem;padding:2px 7px;border-radius:4px;margin-bottom:6px}
.ct.common{background:#6b7280;color:#1a1a2e}.ct.uncommon{background:#3b82f6;color:#fff}
.ct.rare{background:#a855f7;color:#fff}.ct.legendary{background:#f59e0b;color:#1a1a2e}
.ce{font-size:.82rem;color:#a0a0a0;line-height:1.4}
.tier{display:inline-block;font-size:.7rem;font-weight:bold;padding:2px 8px;border-radius:12px;margin-left:6px}
.tier.s{background:#ff4d4d}.tier.a{background:#ff8c00}.tier.b{background:#ffd700;color:#1a1a2e}
.tier.c{background:#9acd32;color:#1a1a2e}.tier.d{background:#87ceeb;color:#1a1a2e}.tier.e{background:#808080}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:.68rem;padding:2px 6px;background:rgba(255,255,255,.08);border-radius:4px;color:#a0a0a0}
.legend{margin-bottom:14px;font-size:.85rem;color:#a0a0a0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.legend span{display:flex;align-items:center;gap:4px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:1000}
.modal.on{display:flex}
.mc{background:#16213e;border-radius:16px;padding:28px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;border:2px solid #e94560;position:relative}
.mx{position:absolute;top:12px;right:16px;font-size:1.8rem;cursor:pointer;color:#a0a0a0}
.mn{font-size:1.4rem;font-weight:700;margin-bottom:12px}
.mm{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.me{font-size:1rem;line-height:1.6;color:#a0a0a0;padding-bottom:14px;border-bottom:1px solid #333;margin-bottom:14px}
.ms h4{font-size:.95rem;margin-bottom:8px;color:#f5a623}
.ms ul{list-style:none;font-size:.9rem;color:#a0a0a0}
.ms li{padding:3px 0}
.empty{text-align:center;padding:40px;color:#a0a0a0}

</style>
</head>

var TIER = {S:0,A:1,B:2,C:3,D:4,E:5};
var COLORS = {common:'linear-gradient(135deg,#6b7280,#4b5563)',uncommon:'linear-gradient(135deg,#3b82f6,#1d4ed8)',rare:'linear-gradient(135deg,#a855f7,#7e22ce)',legendary:'linear-gradient(135deg,#f59e0b,#d97706)'};
var RNAMES = {common:'普通',uncommon:'稀有',rare:'超稀有',legendary:'传奇'};

function tierLabel(t){return RNAMES[t]||t}

function cardHTML(j){
  var tags = (j.tags||[]).map(function(t){return '<span class="tag">'+t+'</span>'}).join('');
  var tier = j.tier ? '<span class="tier '+j.tier.toLowerCase()+'">'+j.tier+'</span>' : '';
  return '<div class="card '+j.rarity+'" onclick="show(\''+j.id+'\')">'+
    '<div class="ci" style="background:'+COLORS[j.rarity]+'">'+j.name.charAt(0)+'</div>'+
    '<div class="cn"><b>'+j.name+'</b>'+tier+'</div>'+
    '<span class="ct '+j.rarity+'">'+tierLabel(j.rarity)+'</span>'+
    '<p class="ce">'+j.effect+'</p>'+
    '<div class="tags">'+tags+'</div></div>';
}

function show(id){
  var j = JOKERS[id];
  if(!j)return;
  var syn = (j.synergy||[]);
  var synHTML = syn.length ? '<div class="ms"><h4>协同</h4><ul>'+syn.map(function(s){return '<li>'+s+'</li>'}).join('')+'</ul></div>' : '';
  var tier = j.tier ? '<span class="tier '+j.tier.toLowerCase()+'">'+j.tier+'</span>' : '';
  document.getElementById('modal-body').innerHTML = '<h2 class="mn">'+j.name+'</h2>'+
    '<div class="mm"><span class="ct '+j.rarity+'">'+tierLabel(j.rarity)+'</span>'+tier+'</div>'+
    '<p class="me">'+j.effect+'</p>'+synHTML;
  document.getElementById('modal').classList.add('on');
}

function closeModal(){document.getElementById('modal').classList.remove('on');}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.nav').forEach(function(n){n.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('on');
  document.getElementById('tab-'+name+'-btn').classList.add('active');
}

function doSearch(q){
  var lq = q.toLowerCase();
  var filtered = Object.values(JOKERS).filter(function(j){
    return j.name.toLowerCase().indexOf(lq)>=0 || j.effect.toLowerCase().indexOf(lq)>=0;
  });
  document.getElementById('search-grid').innerHTML = filtered.length ? filtered.map(cardHTML).join('') : '<div class="empty">No results</div>';
}

document.addEventListener('DOMContentLoaded',function(){
  var sorted = Object.values(JOKERS).sort(function(a,b){return (TIER[a.tier]||9)-(TIER[b.tier]||9);});
  document.getElementById('joker-grid').innerHTML = sorted.map(cardHTML).join('');
});

document.getElementById('modal').onclick = function(e){if(e.target===this)closeModal();};

</script>
